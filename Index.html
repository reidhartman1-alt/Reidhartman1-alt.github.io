<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltStore Installer</title>
    <style>
        /* Rainbow Animation Logic */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column; /* Stack text and button vertically */
            justify-content: center;
            align-items: center;
            background: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #e3e81d, #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3);
            background-size: 1800% 1800%;
            animation: rainbow 18s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }

        @keyframes rainbow {
            0%{background-position:0% 82%}
            50%{background-position:100% 19%}
            100%{background-position:0% 82%}
        }

        h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            font-weight: 800;
        }

        /* The Install Button */
        .install-btn {
            padding: 20px 50px;
            font-size: 1.25rem;
            font-weight: bold;
            color: #333;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .install-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            background: #f8f8f8;
        }

        .install-btn:active {
            transform: translateY(1px);
        }

        p {
            color: white;
            margin-top: 20px;
            font-weight: 500;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <h1>AltStore Installer</h1>

    <!-- Replace the URL after 'url=' with your actual .plist link -->
    <a href="itms-services://?action=download-manifest&url=https://github.com/reidhartman1-alt/Altstore-for-my-GitHub/raw/refs/heads/main/Altstore.plist" class="install-btn">
        Install Now
    </a>

    <p>Tap to begin OTA Installation</p>

</body>
</html>
